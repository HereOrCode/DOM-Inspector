<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        color: #111827;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 10px;
        padding: 16px;
      }

      button {
        min-height: 48px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        color: #334155;
        font: inherit;
        font-weight: 750;
      }
    </style>
  </head>
  <body>
    <main>
      <button type="button">Frame target</button>
    </main>
  </body>
</html>
