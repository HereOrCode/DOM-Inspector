<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        color: #111827;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 10px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="frame-shadow-host"></div>
    </main>

    <script>
      const host = document.querySelector("#frame-shadow-host");
      const root = host.attachShadow({ mode: "open" });

      root.innerHTML = `
        <style>
          button {
            width: 100%;
            min-height: 48px;
            border: 1px solid #a78bfa;
            border-radius: 8px;
            background: #faf5ff;
            color: #5b21b6;
            font: 750 16px/1.2 Inter, ui-sans-serif, system-ui, sans-serif;
          }
        </style>
        <button type="button">Frame shadow target</button>
      `;
    </script>
  </body>
</html>
